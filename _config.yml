###########################################################
### BioFlowBeauty - _config.yml
### Women's Health & Beauty Blog by Leonardo Olivieri Carvalho
### Powered by Beautiful Jekyll | GitHub Pages
###########################################################

############################
# --- Required options --- #
############################

title: BioFlowBeauty
description: "Evidence-based beauty and women's health — written by a biomedical scientist"
author: Leonardo Olivieri Carvalho
url: "https://bioflowbeauty.com"
baseurl: ""

###############################################
# --- List of links in the navigation bar --- #
###############################################

navbar-links:
  Skin & Beauty:
    - Skincare Science: "tags#skincare"
    - Anti-Aging: "tags#anti-aging"
    - Makeup Safety: "tags#makeup"
    - Hair Health: "tags#hair"
  Women's Health:
    - Hormonal Health: "tags#hormones"
    - Nutrition for Women: "tags#nutrition"
    - Weight Management: "tags#weight-management"
    - Disease Prevention: "tags#prevention"
  Wellness:
    - Sleep & Recovery: "tags#sleep"
    - Stress Management: "tags#stress"
    - Gut Health: "tags#gut-health"
  Recommended: "recommended/"
  About: "aboutme/"
  Contact: "contact/"
  Privacy Policy: "privacypolicy/"

################
# --- Logo --- #
################

round-avatar: false
title-img: "/assets/img/bioflowbeauty-logo.svg"
favicon: "/assets/img/favicon-32x32.png"

#####################################
# --- Footer social media links --- #
#####################################

social-network-links:
  email: "contact@bioflowbeauty.com"
  twitter: "LeonardoC23116"
  linkedin: "leonardo-carvalho-8a960728"
  rss: true

rss-description: "Evidence-based beauty and women's health insights — written by a biomedical scientist."

###########################
# --- General options --- #
###########################

share-links-active:
  twitter: true
  facebook: true
  linkedin: true
  vk: false

url-pretty: "bioflowbeauty.com"

excerpt_length: 55
feed_show_excerpt: true
feed_show_tags: true
post_search: true
edit_page_button: false
navbar-var-length: true

keywords: "women's health, skincare, beauty science, hormonal health, anti-aging, nutrition for women, hair health, makeup safety, weight management, biomedical, evidence-based beauty, bioflowbeauty"

######################################
# --- Colours / background image --- #
######################################

navbar-col: "#8b3a5a"
navbar-text-col: "#fdf0e8"
navbar-border-col: "#c9956c"
page-col: "#fdf8f5"
text-col: "#2d1b14"
link-col: "#8b3a5a"
hover-col: "#c9956c"
footer-col: "#8b3a5a"
footer-text-col: "#f5ede6"
footer-link-col: "#c9956c"
footer-hover-col: "#f5ede6"

site-css:
  - "/assets/css/bioflowbeauty-custom.css"

site-js:
  - "/assets/js/bioflowbeauty-effects.js"

#################################
# --- Web Analytics Section --- #
#################################

# google_analytics: "G-XXXXXXXXXX"  # propriedade antiga - nao usar
gtag: "G-YD1K38VXSG"

####################
# --- Comments --- #
####################

utterances:
  repository: "bioflowbeauty/bioflowbeauty"
  issue-term: title
  theme: github-light
  label: blog-comments

################
# --- Misc --- #
################

show-date: true
date_format: "%B %-d, %Y"
timezone: "America/Sao_Paulo"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 6

kramdown:
  input: GFM

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true
      social-share: true
  -
    scope:
      path: ""
    values:
      layout: "page"

exclude:
  - CHANGELOG.md
  - Dockerfile
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - screenshot.png
  - docs/

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-seo-tag
